<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoSphere - Seller Login</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
.site-footer {
  margin: 2.8rem 1.5rem 1.5rem;
  padding: 4.2rem 4.5rem;
  background: rgba(255, 255, 255, 0.72);
  border-radius: 3.2rem;
  border: none;
  box-shadow: none;
}

.site-footer p {
  margin: 0;
  color: #6f7c96;
  font-size: 1rem;
  line-height: 1.8;
}
  </style>
</head>
<body>
  <div class="site-canvas site-page-shell">
    <nav class="site-navbar" data-site-navbar>
      <div class="site-navbar__inner">
        <a href="../index.html" class="site-logo">AutoSphere</a>
        <div class="site-nav site-nav--desktop">
          <a href="search.html" data-nav-link>Search</a>
          <a href="add-car.html" data-nav-link>Add Car</a>
          <a href="register.html" data-nav-link>Register</a>
          <a href="login.html" data-nav-link class="is-active">Login</a>
        </div>
        <button class="site-nav-toggle" data-nav-toggle aria-label="Toggle navigation">
          <span class="site-nav-toggle__line"></span>
          <span class="site-nav-toggle__line"></span>
          <span class="site-nav-toggle__line"></span>
        </button>
      </div>
      <div class="site-nav--mobile" data-mobile-nav>
        <a href="search.html" data-nav-link>Search</a>
        <a href="add-car.html" data-nav-link>Add Car</a>
        <a href="register.html" data-nav-link>Register</a>
        <a href="login.html" data-nav-link class="is-active">Login</a>
      </div>
    </nav>

    <main class="member-page">
      <div class="shell-container">
        <div class="shell-card member-page__panel">
          <div class="login-header" style="text-align: center; margin-bottom: 3rem;">
        <h1 style="max-width: none; margin: 0.85rem auto 0; text-align: center;">Seller Login</h1>
  <p style="max-width: 42rem; margin: 1.2rem auto 0; text-align: center;">
    This page keeps the shared AutoSphere shell ready for the login and session workflow.
  </p>
</div>
          <div class="login-form-container" style="max-width: 420px; margin: 0 auto;">
            <form class="login-form" style="display: grid; gap: 1.25rem;">
              <div class="form-group" style="display: grid; gap: 0.5rem;">
                <label style="font-size: 0.9rem; font-weight: 700; color: var(--color-ink);">Email / Username</label>
                <input type="text" style="
                  height: 3.5rem;
                  padding: 0 1.25rem;
                  border-radius: var(--radius-md);
                  border: 1px solid var(--color-line);
                  background: rgba(255, 255, 255, 0.7);
                  font: inherit;
                  transition: border-color 220ms ease, box-shadow 220ms ease;
                " placeholder="Enter your email or username"
                onfocus="this.style.borderColor='var(--color-rose)'; this.style.boxShadow='0 0 0 3px rgba(255, 61, 127, 0.1)';"
                onblur="this.style.borderColor='var(--color-line)'; this.style.boxShadow='none';">
              </div>

              <div class="form-group" style="display: grid; gap: 0.5rem;">
                <label style="font-size: 0.9rem; font-weight: 700; color: var(--color-ink);">Password</label>
                <input type="password" style="
                  height: 3.5rem;
                  padding: 0 1.25rem;
                  border-radius: var(--radius-md);
                  border: 1px solid var(--color-line);
                  background: rgba(255, 255, 255, 0.7);
                  font: inherit;
                  transition: border-color 220ms ease, box-shadow 220ms ease;
                " placeholder="Enter your password"
                onfocus="this.style.borderColor='var(--color-rose)'; this.style.boxShadow='0 0 0 3px rgba(255, 61, 127, 0.1)';"
                onblur="this.style.borderColor='var(--color-line)'; this.style.boxShadow='none';">
              </div>

              <div class="form-options" style="display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: var(--color-muted);">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                  <input type="checkbox" style="accent-color: var(--color-rose);"> Remember me
                </label>
              </div>

              <div class="login-actions" style="display: flex; justify-content: center;">
              <button type="submit" class="button button-primary" style="
                min-width: 12rem;
                height: 3.65rem;
                border-radius: 999px;
                color: var(--color-ink);
                font-size: 0.92rem;
                font-weight: 850;
                letter-spacing: -0.02em;
                transition: transform 260ms var(--ease-premium), box-shadow 260ms ease;
              " onmouseover="this.style.transform='translateY(-0.12rem)';"
              onmouseout="this.style.transform='translateY(0)';">
                Login
              </button>
              </div>
            </form>

            <div class="login-footer" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--color-muted);">
              Don't have an account? <a href="register.html" style="color: var(--color-rose); font-weight: 700;">Register here</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <footer class="site-footer">
    <p>QHE4103 Fundamentals of Web Technology · Shared shell by Member 1 wangchaoyu.</p>
  </footer>
  <script src="../assets/js/main.js"></script>
</body>
</html>
